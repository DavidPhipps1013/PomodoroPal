<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Blocked</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .container img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .bg {
            height: 100vh;
            width: 100vw;
            object-fit: cover;

            opacity: 0.7;
            z-index: 1;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .blocked {
            height: 100vh;
            width: auto;
            max-width: 100vw;
            object-fit: contain;

            z-index: 2;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="images/background.png" class="bg" alt="Background" />
        <img src="images/blocked.gif" class="blocked" alt="Blocked" />
    </div>
</body>

</html>
